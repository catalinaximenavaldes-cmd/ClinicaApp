<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Stock - CliniBienVital</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        /* Ajuste para que el contenido use más ancho de pantalla */
        .main-content {
            max-width: 1000px; /* Aumentamos el ancho máximo */
            margin: 0 auto;
            padding: 20px;
        }

        /* Formulario en una sola línea (Desktop) */
        .form-nuevo { 
            background: #fff; 
            padding: 25px; 
            border-radius: 12px; 
            border: 1px solid #e67e22; 
            margin-bottom: 30px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        
        .inputs-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        .input-field {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 150px;
        }

        .input-field label {
            font-size: 12px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .input-field input { 
            padding: 12px; 
            border-radius: 6px; 
            border: 1px solid #ccc; 
            font-size: 16px;
        }

        /* Tabla más grande y legible */
        table { 
            width: 100%; 
            border-collapse: separate; 
            border-spacing: 0;
            background: white; 
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        th { 
            background-color: #e67e22; 
            color: white; 
            padding: 15px;
            font-size: 16px;
        }

        td { 
            padding: 12px; 
            border-bottom: 1px solid #eee;
            vertical-align: middle;
        }

        /* Inputs dentro de la tabla */
        .input-tabla { 
            width: 100%; 
            padding: 8px;
            border: 1px solid transparent; 
            background: #f9f9f9; 
            text-align: center; 
            border-radius: 4px;
            font-size: 15px;
        }

        .input-tabla:focus { 
            background: #fff; 
            border: 1px solid #e67e22; 
            outline: none;
        }

        .stock-bajo { background-color: #fff5f5 !important; }
        .stock-bajo input { background-color: #ffebeb; color: #c0392b; font-weight: bold; }

        .btn-add { 
            background: #e67e22; 
            color: white; 
            border: none; 
            padding: 13px 25px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold;
            height: 46px;
        }

        .btn-actualizar { 
            background: #27ae60; 
            color: white; 
            padding: 18px; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            margin-top: 30px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(39, 174, 96, 0.3);
        }
    </style>
</head>
<body>

<header class="app-header">
    <h1>📦 Gestión de Inventario</h1>
</header>

<div class="main-content">
    <button class="btn-volver" onclick="window.location.href='index.html'">⬅ Volver al Menú</button>

    <div class="form-nuevo">
        <h3 style="margin-top:0; color:#2c3e50;">➕ Agregar Nuevo Producto</h3>
        <div class="inputs-group">
            <div class="input-field">
                <label>Nombre del Insumo</label>
                <input type="text" id="nuevo-nombre" placeholder="Ej: Jeringas">
            </div>
            <div class="input-field" style="flex:0.5;">
                <label>Cantidad</label>
                <input type="number" id="nuevo-stock" placeholder="0">
            </div>
            <div class="input-field" style="flex:0.5;">
                <label>Stock Mín.</label>
                <input type="number" id="nuevo-min" placeholder="0">
            </div>
            <div class="input-field">
                <label>Unidad de Medida</label>
                <input type="text" id="nuevo-unidad" placeholder="Ej: Cajas de 100">
            </div>
            <button class="btn-add" onclick="agregarFilaLocal()">Añadir</button>
        </div>
    </div>
    
    <table>
        <thead>
            <tr>
                <th style="text-align:left; width: 40%;">Insumo</th>
                <th style="width: 12%;">Cant.</th>
                <th style="width: 12%;">Mín.</th>
                <th style="width: 25%;">Unidad</th>
                <th style="width: 11%;">Acción</th>
            </tr>
        </thead>
        <tbody id="tabla-body">
            <tr><td colspan="5">Cargando inventario...</td></tr>
        </tbody>
    </table>

    <button id="btn-save" class="btn-actualizar" onclick="guardarCambios()">💾 Guardar Cambios</button>
</div>

<script src="url.js"></script>
<script>
    if (localStorage.getItem("rol") !== "admin") { window.location.href = "index.html"; }

    const URL = CONFIG.API_URL;
    let datosLocales = [];

    function cargarStock() {
        fetch(URL + "?hoja=Stock")
        .then(res => res.json())
        .then(data => {
            datosLocales = data;
            renderizarTabla();
        });
    }

    function renderizarTabla() {
        const body = document.getElementById("tabla-body");
        body.innerHTML = "";

        for (let i = 1; i < datosLocales.length; i++) {
            const [id, nombre, cantidad, minimo, unidad] = datosLocales[i];
            const esBajo = parseInt(cantidad) <= parseInt(minimo);
            
            const fila = document.createElement("tr");
            if (esBajo) fila.className = "stock-bajo";

            fila.innerHTML = `
                <td><input type="text" class="input-tabla" style="text-align:left; padding-left:10px;" value="${nombre}" onchange="actualizarDato(${i}, 1, this.value)"></td>
                <td><input type="number" class="input-tabla" value="${cantidad}" onchange="actualizarDato(${i}, 2, this.value)"></td>
                <td><input type="number" class="input-tabla" value="${minimo}" onchange="actualizarDato(${i}, 3, this.value)"></td>
                <td><input type="text" class="input-tabla" value="${unidad}" onchange="actualizarDato(${i}, 4, this.value)"></td>
                <td><button class="btn-eliminar" onclick="eliminarFila(${i})">🗑️ Borrar</button></td>
            `;
            body.appendChild(fila);
        }
    }

    function actualizarDato(fila, col, valor) {
        datosLocales[fila][col] = valor;
    }

    function agregarFilaLocal() {
        const n = document.getElementById("nuevo-nombre").value;
        const s = document.getElementById("nuevo-stock").value || 0;
        const m = document.getElementById("nuevo-min").value || 0;
        const u = document.getElementById("nuevo-unidad").value || "Un";

        if(!n) return alert("Ingresa al menos el nombre del producto.");

        datosLocales.push([datosLocales.length, n, s, m, u]);
        renderizarTabla();
        
        // Limpiar campos
        document.getElementById("nuevo-nombre").value = "";
        document.getElementById("nuevo-stock").value = "";
        document.getElementById("nuevo-min").value = "";
        document.getElementById("nuevo-unidad").value = "";
    }

    function eliminarFila(index) {
        if(confirm("¿Eliminar este insumo definitivamente?")) {
            datosLocales.splice(index, 1);
            renderizarTabla();
        }
    }

    function guardarCambios() {
        const btn = document.getElementById("btn-save");
        btn.innerText = "⏳ Sincronizando...";
        btn.disabled = true;

        fetch(URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                accion: "actualizarStock",
                datos: datosLocales
            })
        }).then(() => {
            alert("✅ ¡Cambios guardados con éxito!");
            location.reload();
        });
    }

    window.onload = cargarStock;
</script>
</body>
</html>
