<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agenda - CliniBienVital</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .agenda-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        /* --- FILTROS Y CALENDARIO --- */
        .seccion-filtros {
            background: var(--morado-agenda);
            padding: 20px;
            border-radius: 15px;
            border: 2px solid #d2b4de;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .filtros-agenda { display: flex; gap: 10px; margin-bottom: 15px; }
        
        .btn-filtro {
            flex: 1; padding: 12px; border-radius: 8px; border: none;
            font-weight: bold; cursor: pointer; background: #fff; color: #7f8c8d; transition: 0.3s;
            border: 1px solid #d2b4de;
        }
        .btn-filtro.activo { 
            background: var(--morado-fuerte); 
            color: white; 
            box-shadow: 0 4px 6px rgba(142, 68, 173, 0.2); 
        }

        /* --- ACORDEÓN POR PACIENTE --- */
        .grupo-paciente {
            background: white;
            border-radius: 12px;
            margin-bottom: 12px;
            overflow: hidden;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid #ddd;
        }

        .header-paciente {
            background: var(--azul-clinico);
            color: white;
            padding: 15px;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-weight: bold;
            transition: 0.3s;
        }

        .header-paciente:hover { background: #34495e; }

        .lista-citas-interna {
            display: none; /* Se despliega al hacer clic */
            padding: 15px;
            background: #fdfaff;
        }

        /* --- CARDS DE CITAS --- */
        .cita-card {
            background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            border-left: 6px solid var(--morado-fuerte);
        }

        .cita-info b { font-size: 1.1rem; color: #2c3e50; display: block; }
        .cita-info span { color: #7f8c8d; font-size: 0.85rem; }
        
        .tratamiento-tag {
            background: #eef2f3; color: var(--azul-documentos); padding: 4px 10px;
            border-radius: 20px; font-size: 0.8rem; font-weight: bold; margin-top: 5px; display: inline-block;
        }

        .acciones-container { display: flex; flex-direction: column; gap: 5px; align-items: flex-end; }

        .btn-atender { background: var(--verde-salud); color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-eliminar { background: #e74c3c; color: white; border: none; padding: 8px 15px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 0.8rem; }
        
        .estado-realizado { border-left-color: var(--verde-salud); background: #f9f9f9; opacity: 0.8; }
        .check-icon { color: var(--verde-salud); font-weight: bold; font-size: 1rem; }
        
        .fecha-encabezado {
            text-align: center; color: var(--morado-fuerte); margin-bottom: 15px; font-weight: bold;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

<header class="app-header">
    <h1>📅 Agenda de Pacientes</h1>
</header>

<div class="agenda-container">
    <button class="btn-volver" style="margin-bottom: 20px;" onclick="window.location.href='index.html'">⬅ Volver al Menú</button>
    
    <div class="seccion-filtros">
        <div class="filtros-agenda">
            <button id="filtro-hoy" class="btn-filtro activo" onclick="cambiarVista('hoy')">Citas de Hoy</button>
            <button id="filtro-todas" class="btn-filtro" onclick="cambiarVista('todas')">Ver Historial</button>
        </div>

        <div id="contenedor-calendario" style="text-align: center;">
            <label style="font-size: 0.9rem; color: #666;">📅 Seleccionar fecha específica:</label>
            <input type="date" id="input-fecha" onchange="filtrarPorCalendario()" style="margin-top: 5px;">
        </div>
    </div>

    <div id="fecha-actual" class="fecha-encabezado"></div>

    <div id="lista-agenda">
        <p style="text-align: center; color: #7f8c8d;">Cargando citas...</p>
    </div>
</div>

<script src="url.js"></script>
<script>
    const URL = CONFIG.API_URL;
    let vistaActual = 'hoy';
    let datosCompletos = [];
    const hoyLocal = new Date().toLocaleDateString('es-CL'); 

    async function cargarAgenda() {
        try {
            const res = await fetch(URL + "?hoja=Agenda");
            const data = await res.json();
            datosCompletos = data.slice(1); 
            renderizarAgenda();
        } catch (error) {
            document.getElementById("lista-agenda").innerHTML = "Error al conectar con la base de datos.";
        }
    }

    function renderizarAgenda(citasPersonalizadas = null) {
        const contenedor = document.getElementById("lista-agenda");
        const etiquetaFecha = document.getElementById("fecha-actual");
        contenedor.innerHTML = "";

        let listaFiltrada = citasPersonalizadas;

        if (!listaFiltrada) {
            if (vistaActual === 'hoy') {
                etiquetaFecha.innerText = "Citas para hoy: " + hoyLocal;
                listaFiltrada = datosCompletos.filter(fila => {
                    const fechaCita = new Date(fila[0]).toLocaleDateString('es-CL');
                    return fechaCita === hoyLocal;
                });
            } else {
                etiquetaFecha.innerText = "Historial Completo";
                listaFiltrada = [...datosCompletos];
            }
        }

        if (listaFiltrada.length === 0) {
            contenedor.innerHTML = `<p style='text-align:center; color:#95a5a6;'>No hay registros para mostrar.</p>`;
            return;
        }

        // --- AGRUPAR POR PACIENTE ---
        const grupos = {};
        listaFiltrada.forEach(fila => {
            const nombrePaciente = fila[2];
            if (!grupos[nombrePaciente]) grupos[nombrePaciente] = [];
            grupos[nombrePaciente].push(fila);
        });

        // Ordenar pacientes alfabéticamente
        const nombresOrdenados = Object.keys(grupos).sort();

        nombresOrdenados.forEach(nombre => {
            const grupoDiv = document.createElement("div");
            grupoDiv.className = "grupo-paciente";
            
            grupoDiv.innerHTML = `
                <div class="header-paciente" onclick="toggleAcordeon(this)">
                    <span>👤 ${nombre}</span>
                    <span>${grupos[nombre].length} cita(s) ▾</span>
                </div>
                <div class="lista-citas-interna">
                    ${grupos[nombre].map(fila => crearCardCita(fila)).join('')}
                </div>
            `;
            contenedor.appendChild(grupoDiv);
        });
    }

    function crearCardCita(fila) {
        let [fecha, hora, paciente, tratamiento, estado] = fila;
        const fechaCita = new Date(fecha).toLocaleDateString('es-CL');
        
        let horaLimpia = hora.toString();
        if (horaLimpia.includes("T")) {
            horaLimpia = horaLimpia.split("T")[1].substring(0, 5);
        } else {
            horaLimpia = horaLimpia.substring(0, 5);
        }

        return `
            <div class="cita-card ${estado === 'Realizado' ? 'estado-realizado' : ''}">
                <div class="cita-info">
                    <span>📅 ${fechaCita} | 🕒 ${horaLimpia} hrs</span>
                    <b>${tratamiento}</b>
                    <div class="tratamiento-tag">💉 ${tratamiento}</div>
                </div>
                <div class="acciones-container">
                    ${estado === "Realizado" 
                        ? `<span class="check-icon">✅ Atendido</span>` 
                        : `<button class="btn-atender" onclick="confirmarAtencion('${paciente}', '${tratamiento}')">Atender</button>
                           <button class="btn-eliminar" onclick="borrarCita('${paciente}', '${tratamiento}')">Borrar</button>`}
                </div>
            </div>
        `;
    }

    function toggleAcordeon(elemento) {
        const panel = elemento.nextElementSibling;
        const isVisible = panel.style.display === "block";
        panel.style.display = isVisible ? "none" : "block";
    }

    function cambiarVista(vista) {
        vistaActual = vista;
        document.getElementById('input-fecha').value = ""; // Limpiar calendario
        document.getElementById('filtro-hoy').classList.toggle('activo', vista === 'hoy');
        document.getElementById('filtro-todas').classList.toggle('activo', vista === 'todas');
        renderizarAgenda();
    }

    function filtrarPorCalendario() {
        const fechaSeleccionada = document.getElementById("input-fecha").value;
        if (!fechaSeleccionada) return;

        // Convertimos YYYY-MM-DD a formato local para comparar
        const [y, m, d] = fechaSeleccionada.split('-');
        const fechaBusqueda = new Date(y, m - 1, d).toLocaleDateString('es-CL');

        const filtradas = datosCompletos.filter(fila => {
            const fechaCita = new Date(fila[0]).toLocaleDateString('es-CL');
            return fechaCita === fechaBusqueda;
        });

        document.getElementById('filtro-hoy').classList.remove('activo');
        document.getElementById('filtro-todas').classList.remove('activo');
        document.getElementById("fecha-actual").innerText = "Resultados para: " + fechaBusqueda;
        
        renderizarAgenda(filtradas);
    }

    async function confirmarAtencion(paciente, tratamiento) {
        if (!confirm(`¿Confirmar atención de ${paciente}?`)) return;
        await enviarPeticion({ accion: "confirmarAsistenciaDesdeAgenda", paciente, tratamiento });
    }

    async function borrarCita(paciente, tratamiento) {
        if (!confirm(`¿Eliminar cita de ${paciente}?`)) return;
        await enviarPeticion({ accion: "eliminarCita", paciente, tratamiento });
    }

    async function enviarPeticion(datos) {
        try {
            await fetch(URL, { method: "POST", mode: "no-cors", body: JSON.stringify(datos) });
            alert("✅ Hecho.");
            setTimeout(cargarAgenda, 800);
        } catch (error) { alert("Error."); }
    }

    window.onload = cargarAgenda;
</script>
</body>
</html>
