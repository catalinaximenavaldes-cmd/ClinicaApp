<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clínico - CliniBienVital</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .perfil-paciente {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #27ae60;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .perfil-paciente p {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #34495e;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 4px;
        }
        .header-nota {
            background: #fff;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #bdc3c7;
            border-left: 8px solid #3498db;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .contenido-nota {
            display: none;
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .flecha { font-size: 12px; transition: 0.3s; }
        .abierto .flecha { transform: rotate(180deg); }
    </style>
</head>
<body>

    <header class="app-header">
        <img src="logoclinica.png" alt="Logo CliniBienVital">
        <h1>CliniBienVital</h1>
    </header>

    <div class="main-content">
        <button class="btn-volver" onclick="window.location.href='index.html'">🏠 Inicio</button>
        <h2 id="titulo-pagina" style="text-align:center;">Pacientes ingresados</h2>
        <div id="lista">Cargando base de datos...</div>
        <br>
        <button id="btnVolverLista" style="display:none;" onclick="location.reload()" class="btn-volver">⬅ Volver a la lista</button>
    </div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbySt5_exzy7LIRSNl-IMv-x84ReavV7vv695nS6FeJhURK122Ep63lPTkDeT39Fm5aW/exec";
let pacientes = {};

fetch(URL)
  .then(res => res.json())
  .then(data => {
    pacientes = {};
    for (let i = 1; i < data.length; i++) {
      let fila = data[i];
      let nombre = fila[1]; 
      if (!pacientes[nombre]) pacientes[nombre] = [];
      pacientes[nombre].push({
        fecha: new Date(fila[0]),
        rut: fila[2], edad: fila[3], direccion: fila[4],
        telefono: fila[5], correo: fila[6], evolucion: fila[7]
      });
    }
    mostrarLista();
  });

function mostrarLista() {
  document.getElementById("btnVolverLista").style.display = "none";
  document.getElementById("titulo-pagina").innerText = "Pacientes ingresados";
  let html = "";
  for (let nombre in pacientes) {
    html += `<div class="card-paciente" onclick="verPaciente('${nombre}')">👤 ${nombre}</div>`;
  }
  document.getElementById("lista").innerHTML = html || "<p>No hay pacientes.</p>";
}

function verPaciente(nombre) {
  // CRUCIAL: Guardamos el nombre en la memoria antes de cualquier otra cosa
  localStorage.setItem("pacienteActual", nombre);

  document.getElementById("btnVolverLista").style.display = "block";
  document.getElementById("titulo-pagina").innerText = "Expediente Completo";
  
  let registros = [...pacientes[nombre]].sort((a,b) => b.fecha - a.fecha);
  let perfil = [...pacientes[nombre]].sort((a,b) => a.fecha - b.fecha)[0];

  let html = `
    <div class="perfil-paciente">
        <h3 style="margin-top:0; color:#27ae60;">Ficha: ${nombre}</h3>
        <p><strong>🆔 Rut:</strong> ${perfil.rut || 'No registrado'}</p>
        <p><strong>🎂 Edad:</strong> ${perfil.edad} años</p>
        <p><strong>🏠 Dirección:</strong> ${perfil.direccion || 'No registrada'}</p>
        <p><strong>📞 Teléfono:</strong> ${perfil.telefono || 'No registrado'}</p>
        <p><strong>📧 Correo:</strong> ${perfil.correo || 'No registrado'}</p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        <button class="btn-guardar" onclick="window.location.href='evolución.html'">➕ Nueva Evolución</button>
        <button onclick="altaPaciente('${nombre}')" style="background:#e67e22; color:white; border:none; margin-top:10px; padding:10px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">🏥 Dar de Alta</button>
    </div>
    <h4 style="color:#2c3e50;">Historial de Atenciones</h4>
  `;

  registros.forEach((e, index) => {
    let displayStyle = (index === 0) ? "block" : "none";
    let abiertoClase = (index === 0) ? "abierto" : "";

    html += `
      <div class="contenedor-acordeon">
          <div class="header-nota ${abiertoClase}" onclick="toggleNota(this)">
              <span>📅 ${e.fecha.toLocaleString()}</span>
              <span class="flecha">▼</span>
          </div>
          <div class="contenido-nota" style="display: ${displayStyle}">
              <p style="white-space: pre-wrap;">${e.evolucion}</p>
              <button onclick="eliminarNota('${nombre}', '${e.fecha.toISOString()}')" style="background:none; border:none; color:red; cursor:pointer; font-size:12px; padding:0; text-decoration:underline;">Eliminar entrada</button>
          </div>
      </div>
    `;
  });

  document.getElementById("lista").innerHTML = html;
}

function toggleNota(elemento) {
    elemento.classList.toggle("abierto");
    let contenido = elemento.nextElementSibling;
    contenido.style.display = (contenido.style.display === "block") ? "none" : "block";
}

function eliminarNota(nombre, fecha) {
  if (confirm("¿Borrar esta evolución?")) {
    fetch(URL, {method: "POST", mode: "no-cors", body: JSON.stringify({accion: "eliminar", nombre: nombre, fecha: fecha})})
    .then(() => location.reload());
  }
}

function altaPaciente(nombre) {
  if (confirm("¿Dar de alta? Se borrará todo el historial.")) {
    fetch(URL, {method: "POST", mode: "no-cors", body: JSON.stringify({accion: "alta", nombre: nombre})})
    .then(() => location.reload());
  }
}
</script>
</body>
</html>
