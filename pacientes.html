<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial Clínico - CliniBienVital</title>
    <link rel="stylesheet" href="estilos.css">
    <style>
        .perfil-paciente {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border: 2px solid #27ae60;
            margin-bottom: 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .perfil-paciente p {
            margin: 8px 0;
            font-size: 0.95rem;
            color: #34495e;
            border-bottom: 1px solid #f1f1f1;
            padding-bottom: 4px;
        }
        .header-nota {
            background: #fff;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
            border: 1px solid #bdc3c7;
            border-left: 8px solid #3498db;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            font-weight: bold;
        }
        .contenido-nota {
            display: none;
            background: #fdfdfd;
            padding: 15px;
            border: 1px solid #ddd;
            border-top: none;
            border-radius: 0 0 8px 8px;
            margin-bottom: 10px;
            line-height: 1.6;
        }
        .flecha { font-size: 12px; transition: 0.3s; }
        .abierto .flecha { transform: rotate(180deg); }
        
        .btn-documentos {
            background: #9b59b6; 
            color: white; 
            border: none; 
            margin-top: 10px; 
            padding: 12px; 
            width: 100%; 
            border-radius: 8px; 
            font-weight: bold; 
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-documentos:hover { background: #8e44ad; }

        /* ESTILOS NUEVOS PARA LA AGENDA */
        .card-agendar {
            background: #f4ecf7;
            border: 2px solid #9b59b6;
            padding: 15px;
            border-radius: 12px;
            margin-top: 15px;
        }
        .card-agendar h4 { margin: 0 0 10px 0; color: #8e44ad; }
        .form-agenda { display: flex; flex-direction: column; gap: 8px; }
        .form-agenda input, .form-agenda select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }
        .btn-confirmar-cita {
            background: #8e44ad;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<header class="app-header">
    <a href="index.html" style="text-decoration: none; display: flex; align-items: center; gap: 10px;">
        <img src="logoclinica.png" alt="Logo CliniBienVital" style="height: 50px; cursor: pointer;"> 
        <h1 style="color: white; margin: 0;">CliniBienVital</h1>
    </a>
</header>

<div class="main-content">
    <button class="btn-volver" onclick="window.location.href='index.html'">🏠 Inicio</button>
    <h2 id="titulo-pagina" style="text-align:center;">Pacientes ingresados</h2>
    <div id="lista">Cargando base de datos...</div>
    <br>
    <button id="btnVolverLista" style="display:none;" onclick="location.reload()" class="btn-volver">⬅ Volver a la lista</button>
</div>

<script src="url.js"></script>

<script>
const URL = CONFIG.API_URL;
let pacientes = {};

fetch(URL)
  .then(res => res.json())
  .then(data => {
    pacientes = {};
    for (let i = 1; i < data.length; i++) {
      let fila = data[i];
      let nombre = fila[1]; 
      if (!pacientes[nombre]) pacientes[nombre] = [];
      pacientes[nombre].push({
        fecha: new Date(fila[0]),
        rut: fila[2], edad: fila[3], direccion: fila[4],
        telefono: fila[5], correo: fila[6], evolucion: fila[7]
      });
    }
    mostrarLista();
  })
  .catch(err => {
    document.getElementById("lista").innerHTML = "Error al conectar con la base de datos.";
  });

function mostrarLista() {
  document.getElementById("btnVolverLista").style.display = "none";
  document.getElementById("titulo-pagina").innerText = "Pacientes ingresados";
  let html = "";
  for (let nombre in pacientes) {
    html += `<div class="card-paciente" onclick="verPaciente('${nombre}')">👤 ${nombre}</div>`;
  }
  document.getElementById("lista").innerHTML = html || "<p>No hay pacientes.</p>";
}

function verPaciente(nombre) {
  localStorage.setItem("pacienteActual", nombre);
  document.getElementById("btnVolverLista").style.display = "block";
  document.getElementById("titulo-pagina").innerText = "Expediente Completo";
  
  let registros = [...pacientes[nombre]].sort((a,b) => b.fecha - a.fecha);
  let perfil = [...pacientes[nombre]].sort((a,b) => a.fecha - b.fecha)[0];

  let html = `
    <div class="perfil-paciente">
        <h3 style="margin-top:0; color:#27ae60;">Ficha: ${nombre}</h3>
        <p><strong>🆔 Rut:</strong> ${perfil.rut || 'No registrado'}</p>
        <p><strong>🎂 Edad:</strong> ${perfil.edad} años</p>
        <p><strong>🏠 Dirección:</strong> ${perfil.direccion || 'No registrada'}</p>
        <p><strong>📞 Teléfono:</strong> ${perfil.telefono || 'No registrado'}</p>
        <p><strong>📧 Correo:</strong> ${perfil.correo || 'No registrado'}</p>
        <hr style="border:0; border-top:1px solid #eee; margin:15px 0;">
        
        <button class="btn-guardar" onclick="window.location.href='evolución.html'">➕ Nueva Evolución</button>
        <button class="btn-documentos" onclick="window.location.href='documentos.html'">📄 Recetas y Exámenes</button>

        <div class="card-agendar">
            <h4>📅 Agendar Próxima Cita</h4>
            <div class="form-agenda">
                <input type="date" id="fecha-cita">
                <input type="time" id="hora-cita">
                <select id="select-tratamiento-cita">
                    <option value="">-- Seleccionar Tratamiento --</option>
                </select>
                <button class="btn-confirmar-cita" onclick="enviarAAgenda('${nombre}')">Guardar en Agenda</button>
            </div>
        </div>

        <button onclick="altaPaciente('${nombre}')" style="background:#e67e22; color:white; border:none; margin-top:15px; padding:10px; width:100%; border-radius:8px; font-weight:bold; cursor:pointer;">🏥 Dar de Alta</button>
    </div>
    <h4 style="color:#2c3e50;">Historial de Atenciones</h4>
  `;

  document.getElementById("lista").innerHTML = html;
  
  // Cargamos los tratamientos en el selector
  cargarTratamientos();

  // Historial de notas
  registros.forEach((e, index) => {
    let displayStyle = (index === 0) ? "block" : "none";
    let abiertoClase = (index === 0) ? "abierto" : "";
    let notaHtml = `
      <div class="contenedor-acordeon">
          <div class="header-nota ${abiertoClase}" onclick="toggleNota(this)">
              <span>📅 ${e.fecha.toLocaleString()}</span>
              <span class="flecha">▼</span>
          </div>
          <div class="contenido-nota" style="display: ${displayStyle}">
              <p style="white-space: pre-wrap;">${e.evolucion}</p>
              <button onclick="eliminarNota('${nombre}', '${e.fecha.toISOString()}')" style="background:none; border:none; color:red; cursor:pointer; font-size:12px; padding:0; text-decoration:underline;">Eliminar entrada</button>
          </div>
      </div>
    `;
    document.getElementById("lista").insertAdjacentHTML('beforeend', notaHtml);
  });
}

// FUNCIONES PARA LA AGENDA COORDINADA
async function cargarTratamientos() {
    try {
        const res = await fetch(URL + "?hoja=Tratamientos");
        const data = await res.json();
        const select = document.getElementById("select-tratamiento-cita");
        for (let i = 1; i < data.length; i++) {
            let opt = document.createElement("option");
            opt.value = data[i][0];
            opt.text = data[i][0];
            select.add(opt);
        }
    } catch(e) { console.error("Error al cargar tratamientos"); }
}

async function enviarAAgenda(nombrePaciente) {
    const fecha = document.getElementById("fecha-cita").value;
    const hora = document.getElementById("hora-cita").value;
    const tratamiento = document.getElementById("select-tratamiento-cita").value;

    if (!fecha || !hora || !tratamiento) return alert("Por favor, completa fecha, hora y tratamiento.");

    const btn = event.target;
    btn.innerText = "⏳ Guardando...";
    btn.disabled = true;

    try {
        await fetch(URL, {
            method: "POST",
            mode: "no-cors",
            body: JSON.stringify({
                accion: "crearCita",
                fecha: fecha,
                hora: hora,
                paciente: nombrePaciente,
                tratamiento: tratamiento
            })
        });
        alert("✅ Cita coordinada. Aparecerá en la Agenda el día seleccionado.");
        btn.innerText = "Guardar en Agenda";
        btn.disabled = false;
        // Limpiar campos
        document.getElementById("fecha-cita").value = "";
        document.getElementById("hora-cita").value = "";
        document.getElementById("select-tratamiento-cita").value = "";
    } catch (error) {
        alert("Error al conectar con la agenda.");
        btn.disabled = false;
    }
}

function toggleNota(elemento) {
    elemento.classList.toggle("abierto");
    let contenido = elemento.nextElementSibling;
    if (contenido) {
        contenido.style.display = (contenido.style.display === "block") ? "none" : "block";
    }
}

function eliminarNota(nombre, fecha) {
  if (confirm("¿Borrar esta evolución?")) {
    fetch(URL, {
        method: "POST", 
        mode: "no-cors", 
        body: JSON.stringify({accion: "eliminar", nombre: nombre, fecha: fecha})
    }).then(() => location.reload());
  }
}

function altaPaciente(nombre) {
  if (confirm("¿Dar de alta? El historial se moverá al archivo histórico.")) {
    fetch(URL, {
        method: "POST", 
        mode: "no-cors", 
        body: JSON.stringify({accion: "alta", nombre: nombre})
    }).then(() => location.reload());
  }
}
</script>
</body>
</html>
